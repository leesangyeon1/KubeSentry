        \\\"value\\\": f\\\"`{namespace}`\\\", \\\"short\\\": True},\\n                {\\\"title\\\":
        \\\"Threat\\\", \\\"value\\\": reason, \\\"short\\\": False},\\n                {\\\"title\\\":
        \\\"Action\\\", \\\"value\\\": \\\"Network isolated (DNS only)\\\", \\\"short\\\":
        True},\\n                {\\\"title\\\": \\\"Expires\\\", \\\"value\\\": expiry_time.strftime(\\\"%Y-%m-%d
        %H:%M UTC\\\"), \\\"short\\\": True}\\n            ],\\n            \\\"footer\\\":
        \\\"KubeSentry\\\",\\n            \\\"ts\\\": int(time.time())\\n        }]\\n
        \   }\\n    \\n    try:\\n        requests.post(SLACK_WEBHOOK, json=payload,
        timeout=5)\\n        log(\\\"Slack alert sent\\\", \\\"INFO\\\")\\n    except
        Exception as e:\\n        log(f\\\"Slack failed: {e}\\\", \\\"WARNING\\\")\\n\\ndef
        monitor_tetragon_logs():\\n    \\\"\\\"\\\"Main monitoring loop\\\"\\\"\\\"\\n
        \   log(\\\"Starting Tetragon monitor\\\", \\\"INFO\\\")\\n    \\n    while
        True:\\n        try:\\n            pods = v1.list_namespaced_pod(\\n                namespace=TETRAGON_NAMESPACE,\\n
        \               label_selector=\\\"app.kubernetes.io/name=tetragon\\\"\\n
        \           ).items\\n            \\n            if not pods:\\n                log(\\\"No
        Tetragon pods found\\\", \\\"WARNING\\\")\\n                time.sleep(30)\\n
        \               continue\\n            \\n            pod_name = pods[0].metadata.name\\n
        \           log(f\\\"Monitoring: {pod_name}\\\", \\\"INFO\\\")\\n            \\n
        \           stream = v1.read_namespaced_pod_log(\\n                name=pod_name,\\n
        \               namespace=TETRAGON_NAMESPACE,\\n                container=\\\"tetragon\\\",\\n
        \               follow=True,\\n                _preload_content=False,\\n
        \               timestamps=False\\n            )\\n            \\n            for
        line in stream:\\n                try:\\n                    decoded = line.decode('utf-8').strip()\\n
        \                   if not decoded:\\n                        continue\\n
        \                   \\n                    event = parse_event(decoded)\\n
        \                   is_threat, threat_info = is_suspicious_event(event)\\n
        \                   \\n                    if is_threat and threat_info:\\n
        \                       key = f\\\"{threat_info['namespace']}/{threat_info['pod']}\\\"\\n
        \                       should_isolate, count = record_threat(key, threat_info)\\n
        \                       \\n                        log(\\n                            f\\\"Threat
        detected: {key} | {threat_info['reason']} | \\\"\\n                            f\\\"Count:
        {count}/{THREAT_THRESHOLD}\\\",\\n                            \\\"WARNING\\\"\\n
        \                       )\\n                        \\n                        if
        should_isolate:\\n                            isolate_pod(\\n                                threat_info['pod'],\\n
        \                               threat_info['namespace'],\\n                                threat_info['reason']\\n
        \                           )\\n                            # Clear events
        after isolation\\n                            with threat_lock:\\n                                threat_events[key]
        = []\\n                \\n                except Exception as e:\\n                    log(f\\\"Event
        processing error: {e}\\\", \\\"ERROR\\\")\\n                    continue\\n
        \           \\n            log(\\\"Stream ended, reconnecting...\\\", \\\"WARNING\\\")\\n
        \           time.sleep(5)\\n            \\n        except Exception as e:\\n
        \           log(f\\\"Monitor error: {e}\\\", \\\"ERROR\\\")\\n            time.sleep(30)\\n\\ndef
        cleanup_expired_isolations():\\n    \\\"\\\"\\\"Remove isolation from expired
        pods\\\"\\\"\\\"\\n    log(\\\"Starting cleanup thread\\\", \\\"INFO\\\")\\n
        \   \\n    while True:\\n        try:\\n            time.sleep(3600)  # Check
        every hour\\n            \\n            all_pods = v1.list_pod_for_all_namespaces(\\n
        \               label_selector=f\\\"{ISOLATION_LABEL}=true\\\"\\n            ).items\\n
        \           \\n            now = datetime.utcnow()\\n            \\n            for
        pod in all_pods:\\n                annotations = pod.metadata.annotations
        or {}\\n                expiry_str = annotations.get(\\\"security.kubesentry.io/expiry\\\")\\n
        \               \\n                if not expiry_str:\\n                    continue\\n
        \               \\n                try:\\n                    expiry = datetime.fromisoformat(expiry_str.replace('Z',
        '+00:00'))\\n                    if now \\u003e expiry.replace(tzinfo=None):\\n
        \                       log(f\\\"Removing expired isolation: {pod.metadata.namespace}/{pod.metadata.name}\\\",
        \\\"INFO\\\")\\n                        \\n                        v1.patch_namespaced_pod(\\n
        \                           name=pod.metadata.name,\\n                            namespace=pod.metadata.namespace,\\n
        \                           body={\\n                                \\\"metadata\\\":
        {\\n                                    \\\"labels\\\": {\\n                                        ISOLATION_LABEL:
        None,\\n                                        \\\"security.kubesentry.io/reason\\\":
        None,\\n                                        \\\"security.kubesentry.io/isolated-at\\\":
        None\\n                                    }\\n                                }\\n
        \                           }\\n                        )\\n                except
        Exception as e:\\n                    log(f\\\"Cleanup error for {pod.metadata.name}:
        {e}\\\", \\\"ERROR\\\")\\n                    \\n        except Exception
        as e:\\n            log(f\\\"Cleanup thread error: {e}\\\", \\\"ERROR\\\")\\n\\ndef
        main():\\n    log(\\\"KubeSentry Isolation Controller starting\\\", \\\"INFO\\\")\\n
        \   log(f\\\"Config: THRESHOLD={THREAT_THRESHOLD}, WINDOW={THREAT_WINDOW_SECONDS}s,
        DURATION={ISOLATION_DURATION_HOURS}h\\\", \\\"INFO\\\")\\n    \\n    # Start
        cleanup thread\\n    cleanup_thread = threading.Thread(target=cleanup_expired_isolations,
        daemon=True)\\n    cleanup_thread.start()\\n    \\n    # Start monitoring\\n
        \   monitor_tetragon_logs()\\n\\nif __name__ == \\\"__main__\\\":\\n    main()\\n\"},\"kind\":\"ConfigMap\",\"metadata\":{\"annotations\":{},\"name\":\"controller-script\",\"namespace\":\"default\"}}\n"
